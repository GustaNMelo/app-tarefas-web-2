<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <th:block th:replace="~{/../fragments/head :: head('Cadastro de Usuário')}"></th:block>
  <body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
      <h3>Cadastro de Usuário</h3>
      <form action="saveUser" method="post">
        <div class="form-group">
          <label for="name">Nome:</label>
          <input type="text" class="form-control" id="name" name="name" required/>
        </div>
        
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" class="form-control" id="email" name="email" required/>
        </div>
        
        <div class="form-group">
          <label for="password">Senha:</label>
          <input type="password" class="form-control" id="password" name="password" required/>
        </div>
        
        <div class="form-group">
          <label>Papéis (Roles):</label><br>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="roles" value="Admin" id="roleAdmin"/>
            <label class="form-check-label" for="roleAdmin">Admin</label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="roles" value="Manager" id="roleManager"/>
            <label class="form-check-label" for="roleManager">Manager</label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="roles" value="HR" id="roleHR"/>
            <label class="form-check-label" for="roleHR">HR</label>
          </div>
          <div class="form-check">
            <input type="checkbox" class="form-check-input" name="roles" value="Employee" id="roleEmployee"/>
            <label class="form-check-label" for="roleEmployee">Employee</label>
          </div>
        </div>
        
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-primary">Cadastrar</button>
      </form>
      
      <div th:if="${msg}" class="alert alert-success mt-3" th:text="${msg}"></div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
  </body>
</html>
