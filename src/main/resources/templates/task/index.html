<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <th:block th:replace="~{/../fragments/head :: head('Listar Tarefas')}"></th:block>
  <body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
      <h1>Listagem de Tarefas</h1>
      <table class="table table-striped">
        <thead>
          <tr>
            <th scope="col">Título</th>
            <th scope="col">Descrição</th>
            <th scope="col">Prioridade</th>
            <th scope="col">Categoria</th>
            <th scope="col">Concluída</th>
            <th scope="col">Editar</th>
            <th scope="col">Deletar</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="tarefa : ${tarefasList}">
            <td scope="row" th:text="${tarefa.titulo}"></td>
            <td scope="row" th:text="${tarefa.descricao}"></td>
            <td scope="row" th:text="${tarefa.prioridade}"></td>
            <td scope="row" th:text="${tarefa.categoria}"></td>
            <td scope="row" th:text="${tarefa.concluida ? 'Sim' : 'Não'}"></td>
            <td>
              <a th:href="@{/task/edit/{id}(id=${tarefa.id})}">Editar</a>
            </td>
            <td>
              <a th:href="@{/task/delete/{id}(id=${tarefa.id})}">Deletar</a>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="row">
        <a th:href="@{/task/create}">
          <button sec:authorize="hasAuthority('Admin')" class="btn btn-primary">Cadastrar Tarefa</button>
        </a>
      </div>
    </div>
    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>
  </body>
</html>
