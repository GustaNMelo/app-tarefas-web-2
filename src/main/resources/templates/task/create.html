<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Cadastrar Tarefa</title>
<link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
    crossorigin="anonymous"
/>
</head>
<body>
<div class="container pt-5">
    <h1>Cadastrar Tarefa</h1>
    <form action="#" th:action="@{/task/save}" th:object="${tarefa}" method="POST">
        <div class="form-group row">
            <label for="titulo" class="col-sm-2 col-form-label">Título</label>
            <div class="col-sm-10">
                <input type="text" th:field="*{titulo}" class="form-control" id="titulo" name="titulo" placeholder="Digite o título da tarefa">
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="descricao">Descrição:</label>
            <div class="col-sm-10">
                <textarea id="descricao" th:field="*{descricao}" class="form-control" name="descricao" rows="4" cols="50" placeholder="Digite a descrição da tarefa"></textarea>
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="prioridade">Prioridade:</label>
            <div class="col-sm-10">
                <select th:field="*{prioridade}" class="form-control" id="prioridade" name="prioridade">
                    <option value="">Selecione a prioridade</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                </select>
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="categoria">Categoria:</label>
            <div class="col-sm-10">
                <input type="text" th:field="*{categoria}" class="form-control" id="categoria" name="categoria"
                    placeholder="Digite a categoria (ex: Trabalho, Pessoal, Estudos)">
            </div>
        </div>
        <div class="form-group row">
            <label class="col-sm-2 col-form-label" for="concluida">Concluída:</label>
            <div class="col-sm-10">
                <input type="checkbox" th:field="*{concluida}" class="form-check-input" id="concluida" name="concluida">
            </div>
        </div>
        <button type="submit" class="btn btn-info col-2">Cadastrar Tarefa</button>
    </form>
</div>
</body>
</html>
