<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
  <th:block th:replace="~{/../fragments/head :: head('Projeto')}"></th:block>
  <body>
    <th:block th:replace="~{/../fragments/head :: header}"></th:block>
    <div class="container">
      <h1 th:text="${projeto.id != null} ? 'Editar Projeto' : 'Cadastrar Projeto'"></h1>

      <form th:action="@{/projeto/save}" th:object="${projeto}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
          <ul>
            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
          </ul>
        </div>

        <div class="form-group">
          <label for="nome">Nome do Projeto</label>
          <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Nome do projeto" />
        </div>

        <div class="form-group">
          <label for="dataInicio">Data de Início</label>
          <input type="datetime-local" class="form-control" id="dataInicio" th:field="*{dataInicio}" />
        </div>

        <h4 class="mt-4">Tarefas do Projeto</h4>
        <table class="table table-bordered" id="itens-table">
          <thead>
            <tr>
              <th>Tarefa</th>
              <th>Horas Estimadas</th>
              <th>Remover</th>
            </tr>
          </thead>
          <tbody id="itens-body">
            <tr th:each="item, stat : *{itens}">
              <td>
                <input type="hidden" th:name="'itens[' + ${stat.index} + '].id'" th:value="${item.id}" />
                <select class="form-control" th:name="'itens[' + ${stat.index} + '].tarefa.id'">
                  <option value="">-- Selecione --</option>
                  <option th:each="tarefa : ${tarefas}"
                          th:value="${tarefa.id}"
                          th:text="${tarefa.titulo}"
                          th:selected="${item.tarefa != null and item.tarefa.id == tarefa.id}">
                  </option>
                </select>
              </td>
              <td>
                <input type="number" step="0.5" min="0" class="form-control"
                       th:name="'itens[' + ${stat.index} + '].horasEstimadas'"
                       th:value="${item.horasEstimadas}" />
              </td>
              <td>
                <button type="button" class="btn btn-danger btn-sm" onclick="removeItem(this)">Remover</button>
              </td>
            </tr>
          </tbody>
        </table>

        <button type="button" class="btn btn-secondary mb-3" onclick="addItem()">+ Adicionar Tarefa</button>

        <div class="row">
          <div class="col">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a th:href="@{/projeto}" class="btn btn-outline-secondary ml-2">Cancelar</a>
          </div>
        </div>
      </form>
    </div>

    <th:block th:replace="~{/../fragments/footer :: footer}"></th:block>

    <script th:inline="javascript">
      var tarefas = /*[[${tarefas}]]*/ [];
      var itemIndex = document.querySelectorAll('#itens-body tr').length;

      function addItem() {
        var tbody = document.getElementById('itens-body');
        var row = document.createElement('tr');
        var options = '<option value="">-- Selecione --</option>';
        tarefas.forEach(function(t) {
          options += '<option value="' + t.id + '">' + t.titulo + '</option>';
        });
        row.innerHTML =
          '<td>' +
            '<input type="hidden" name="itens[' + itemIndex + '].id" value="" />' +
            '<select class="form-control" name="itens[' + itemIndex + '].tarefa.id">' + options + '</select>' +
          '</td>' +
          '<td><input type="number" step="0.5" min="0" class="form-control" name="itens[' + itemIndex + '].horasEstimadas" /></td>' +
          '<td><button type="button" class="btn btn-danger btn-sm" onclick="removeItem(this)">Remover</button></td>';
        tbody.appendChild(row);
        itemIndex++;
      }

      function removeItem(btn) {
        var row = btn.closest('tr');
        row.parentNode.removeChild(row);
        reindex();
      }

      function reindex() {
        var rows = document.querySelectorAll('#itens-body tr');
        rows.forEach(function(row, i) {
          row.querySelectorAll('input, select').forEach(function(el) {
            if (el.name) {
              el.name = el.name.replace(/itens\[\d+\]/, 'itens[' + i + ']');
            }
          });
        });
        itemIndex = rows.length;
      }
    </script>
  </body>
</html>
